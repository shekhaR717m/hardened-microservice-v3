name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: powershell

jobs:
  lint:
    name: Lint
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 black

      - name: Run Flake8
        run: python -m flake8 app/ --max-line-length=120

      - name: Run Black Check
        run: python -m black app/ --check

  security-scan:
    name: Security Scan
    needs: lint
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Trivy vulnerability scan
        run: |
          $imageTar = Join-Path $env:RUNNER_TEMP "my-app-${{ github.sha }}.tar"
          $trivyWorkDir = (Resolve-Path $env:RUNNER_TEMP).Path -replace '\\', '/'
          $trivyInput = "/work/$(Split-Path $imageTar -Leaf)"

          docker save my-app:${{ github.sha }} -o $imageTar
          docker run --rm `
            -v "${trivyWorkDir}:/work" `
            aquasec/trivy:0.58.2 image `
            --input $trivyInput `
            --format table `
            --exit-code 1 `
            --severity CRITICAL `
            --ignore-unfixed

          Remove-Item -LiteralPath $imageTar -Force

  build-dashboard:
    name: Build Dashboard
    needs: lint
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build dashboard image
        run: docker build -t my-dashboard:${{ github.sha }} ./dashboard

      - name: Verify image size
        run: |
          $size = docker image inspect my-dashboard:${{ github.sha }} --format='{{.Size}}'
          $sizeMB = [int]($size / 1MB)

          Write-Output "Dashboard image size: $sizeMB MB"

          if ($sizeMB -gt 80) {
            Write-Output "Image exceeds 80MB limit!"
            exit 1
          }

          Write-Output "Image within size budget"

  deploy:
    name: Deploy to K3s
    needs: [security-scan, build-dashboard]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Import images to K3s
        run: |
          function Convert-ToWslPath([string]$Path) {
            $resolved = (Resolve-Path -LiteralPath $Path).Path
            $drive = $resolved.Substring(0, 1).ToLower()
            $pathWithoutDrive = $resolved.Substring(2) -replace '\\', '/'
            return "/mnt/$drive$pathWithoutDrive"
          }

          $appTar = Join-Path $env:RUNNER_TEMP "my-app-${{ github.sha }}.tar"
          $dashboardTar = Join-Path $env:RUNNER_TEMP "my-dashboard-${{ github.sha }}.tar"

          docker save my-app:${{ github.sha }} -o $appTar
          docker save my-dashboard:${{ github.sha }} -o $dashboardTar

          $appTarWsl = Convert-ToWslPath $appTar
          $dashboardTarWsl = Convert-ToWslPath $dashboardTar

          Write-Output "Importing app image from $appTarWsl"
          Write-Output "Importing dashboard image from $dashboardTarWsl"

          wsl sudo k3s ctr images import $appTarWsl
          wsl sudo k3s ctr images import $dashboardTarWsl

          Remove-Item -LiteralPath $appTar, $dashboardTar -Force

      - name: Deploy with Helm
        run: |
          wsl helm upgrade --install my-app ./k8s/charts/my-app `
            --set image.repository=my-app `
            --set image.tag=${{ github.sha }} `
            --set dashboard.image.repository=my-dashboard `
            --set dashboard.image.tag=${{ github.sha }} `
            --wait --timeout=300s --atomic

      - name: Verify deployment
        run: |
          wsl kubectl rollout status deployment/my-app --timeout=60s
          wsl kubectl rollout status deployment/my-app-dashboard --timeout=60s
